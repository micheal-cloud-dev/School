<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Kingdom - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-card {
      background: white; border-radius: 24px; padding: 40px 32px;
      width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h2 { font-size: 26px; font-weight: 700; color: #1a1a2e; }
    .logo p { color: #888; font-size: 13px; margin-top: 4px; }
    .logo i { font-size: 48px; color: #4f46e5; margin-bottom: 8px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .input-box {
      position: relative; display: flex; align-items: center;
      border: 2px solid #e8e8e8; border-radius: 12px; overflow: hidden;
      transition: border-color 0.3s;
    }
    .input-box:focus-within { border-color: #4f46e5; }
    .input-box i { padding: 0 14px; color: #888; font-size: 16px; }
    .input-box input {
      flex: 1; padding: 14px 14px 14px 0; border: none; outline: none;
      font-size: 14px; font-family: 'Poppins', sans-serif;
    }
    .toggle-password { padding: 0 14px; cursor: pointer; color: #888; background: none; border: none; }
    .btn-login {
      width: 100%; padding: 15px; background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white; border: none; border-radius: 12px; font-size: 16px;
      font-weight: 600; cursor: pointer; margin-top: 8px; transition: opacity 0.3s;
      font-family: 'Poppins', sans-serif;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: #fff0f0; border: 1px solid #ffcccc; color: #e53e3e;
      padding: 12px 16px; border-radius: 10px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .error-msg.show { display: block; }
    .loading { display: none; }
    .loading.show { display: inline-block; }
  </style>
</head>
<body>

<div class="login-card">

  <div class="logo">
    <i class="fa-solid fa-crown"></i>
    <h2>My Kingdom</h2>
    <p>School Management System</p>
  </div>

  <div class="error-msg" id="errorMsg">
    <i class="fa-solid fa-circle-exclamation"></i>
    <span id="errorText">Invalid username or password</span>
  </div>

  <div class="form-group">
    <label>Username</label>
    <div class="input-box">
      <i class="fa-solid fa-user"></i>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" id="password" placeholder="Enter your password" />
      <button class="toggle-password" onclick="togglePassword()">
        <i class="fa-regular fa-eye" id="eyeIcon"></i>
      </button>
    </div>
  </div>

  <button class="btn-login" id="loginBtn" onclick="login()">
    <span id="btnText">Login</span>
    <span class="loading" id="loadingSpinner">
      <i class="fa-solid fa-spinner fa-spin"></i> Logging in...
    </span>
  </button>

</div>

<script>
  const API = "https://mykingdom-backend.onrender.com/api";

  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorMsg = document.getElementById("errorMsg");
    const errorText = document.getElementById("errorText");
    const btnText = document.getElementById("btnText");
    const spinner = document.getElementById("loadingSpinner");
    const btn = document.getElementById("loginBtn");

    // Validation
    if (!username || !password) {
      errorText.textContent = "Please enter username and password";
      errorMsg.classList.add("show");
      return;
    }

    // Show loading
    btn.disabled = true;
    btnText.style.display = "none";
    spinner.classList.add("show");
    errorMsg.classList.remove("show");

    try {
      const response = await fetch(`${API}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();

      if (data.success) {
        // Save token and user info
        localStorage.setItem("token", data.data.accessToken);
        localStorage.setItem("refreshToken", data.data.refreshToken);
        localStorage.setItem("username", data.data.username);
        localStorage.setItem("role", data.data.role);

        // Redirect to dashboard
        window.location.href = "index.html";
      } else {
        errorText.textContent = data.error || "Invalid username or password";
        errorMsg.classList.add("show");
      }

    } catch (err) {
      errorText.textContent = "Server error. Please try again.";
      errorMsg.classList.add("show");
    } finally {
      btn.disabled = false;
      btnText.style.display = "inline";
      spinner.classList.remove("show");
    }
  }

  function togglePassword() {
    const input = document.getElementById("password");
    const icon = document.getElementById("eyeIcon");
    if (input.type === "password") {
      input.type = "text";
      icon.className = "fa-regular fa-eye-slash";
    } else {
      input.type = "password";
      icon.className = "fa-regular fa-eye";
    }
  }

  // Allow Enter key to login
  document.addEventListener("keypress", (e) => {
    if (e.key === "Enter") login();
  });

  // If already logged in, redirect
  if (localStorage.getItem("token")) {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
